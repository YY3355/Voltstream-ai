name: VoltStream CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run test suite
        run: python -m tests.test_all
      
      - name: Run module status check
        run: python main.py status

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t voltstream-ai .
      
      - name: Run tests in container
        run: docker run --rm voltstream-ai python -m tests.test_all
      
      - name: Verify container health
        run: docker run --rm voltstream-ai python -c "from core.orchestrator import Orchestrator; print('Container healthy')"
